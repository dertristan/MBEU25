bibliography: references.bib
biblio-style: apsr
link-citations: true
number-sections: true
date: last-modified
date-format: MMMM D, YYYY

format:
  html:
    other-links:
      - text: "View project source"
        icon: github
        href: https://github.com/dertristan/MBEU25
      - text: "Report an issue"
        icon: flag
        href: https://github.com/dertristan/MBEU25/issues
      - text: "Dataset Repository"
        icon: database
        href: https://github.com/ls-konig/eu25games2019
    citeproc: false
    filters:
      - at: pre-quarto
        path: _extensions/andrewheiss/wordcount/citeproc.lua
      - at: pre-quarto
        path: _extensions/andrewheiss/wordcount/wordcount.lua
    toc: true
    toc-depth: 3
    include-in-header:
      text:
        <meta name="robots" content="noindex">
  pdf:
    code-links: false
    toc: false
    toc-depth: 3
    include-in-header:
      text: |
        \usepackage{setspace}
        \setlength{\parindent}{15pt}
        \usepackage[font=scriptsize]{caption}
    thanks: |
      Do not share without consent.
    papersize: a4
    fontsize: 10pt
    linestretch: 1
    geometry:
      - top = 2cm
      - bottom = 2cm
      - left = 2.5cm
      - right = 2.5cm
      - footskip = 20pt
  docx: default