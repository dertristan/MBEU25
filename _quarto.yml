manuscript:
  notebooks:
    - notebook: code/02_data_prep.qmd
      title: "1 Data Preparation"
    - notebook: code/03_multibart_nested_ri_test.qmd
      title: "2 BCF Estimator Test"
    - notebook: code/04_grf_nested_test.qmd
      title: "3 CF Estimator Test"
    - notebook: code/05_bcf_fit.qmd
      title: "4 BCF Fits"
    - notebook: code/06_grf_fit.qmd
      title: "5 CF Fits"
    - notebook: code/07_postprocess_grf.qmd
      title: "6 CF Post-Processing"
    - notebook: code/08_postprocess_bcf.qmd
      title: "7 BCF Post-Processing"
    - notebook: code/09_additional_figs_tables.qmd
      title: "8 Additional Figures & Tables"

